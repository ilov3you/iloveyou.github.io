      *{

          padding:0;
          box-sizing:border-box;
      }

      body{
          overflow:hidden;
          background:black;
          font-family:Arial, sans-serif;
      }

      canvas{
          position:fixed;
          top:0;
          left:0;
          width:100%;
          height:100%;
          opacity:0;
          transition:1s;
          z-index:1;
      }

      .start-screen{
          position:fixed;
          top:0;
          left:0;
          width:100%;
          height:100vh;
          display:flex;
          justify-content:center;
          align-items:center;
          flex-direction:column;

          z-index:10;
      }

      .start-screen h1{
          color:white;
          margin-bottom:20px;
          font-size:2rem;
          text-align:center;
          padding:20px;
      }

      .start-btn{
          padding:15px 40px;
          border:none;
          border-radius:50px;
          background:#ff2d75;
          color:white;
          font-size:1.2rem;
          cursor:pointer;
          transition:0.3s;
          box-shadow:0 0 20px rgba(255,45,117,.5);
      }

      .start-btn:hover{
          transform:scale(1.08);
      }

      .cinematic{
          position:fixed;
          top:0;
          left:0;
          width:100%;
          height:100vh;
          display:flex;
          justify-content:center;
          align-items:center;
          background:black;
          color:white;
          font-size:clamp(2rem, 5vw, 4rem);
          font-weight:300;
          letter-spacing:3px;
          text-align:center;
          padding:20px;
          z-index:20;
          opacity:0;
          transition:opacity 2s ease;
          text-shadow:
              0 0 20px rgba(255,255,255,.4),
              0 0 50px rgba(255,100,150,.3);
      }

      .cinematic.show{
          opacity:1;
      }

      .hidden{
          display:none !important;
      }

      #surpriseBox{
          position:fixed;
          inset:0;
          display:flex;
          justify-content:center;
          align-items:center;
          background:rgba(0,0,0,.85);
          z-index:100;
      }

      .box-content{
          background:rgba(255,255,255,.08);
          backdrop-filter:blur(10px);
          padding:40px;
          border-radius:25px;
          text-align:center;
          color:white;
          box-shadow:0 0 30px rgba(255,255,255,.15);
          animation:fadeIn 1s ease;
      }

      .box-content h2{
          margin-bottom:20px;
      }

      .box-content button{
          border:none;
          padding:14px 30px;
          border-radius:30px;
          background:#ff2d75;
          color:white;
          font-size:1rem;
          cursor:pointer;
      }

      #poemScreen{
          position:fixed;
          inset:0;
          background:black;
          display:flex;
          justify-content:center;
          align-items:center;
          padding:30px;
          z-index:101;

          color:white;
          font-size:1.5rem;
          max-width:800px;
          text-align:center;
          line-height:2;
          white-space:pre-line;
      }

      #flowersScreen{
          position: fixed;
          inset: 0;
          width: 100vw;
          height: 100vh;
          overflow: hidden;
          z-index: 200;
          background: #000;
      }

      #flowersScreen .flowers{
        position: absolute;
        width: 100%;
        height: 100%;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%) scale(0.75);

        display: flex;

      }
.flower{
    position: relative !important;
    margin: 0 -40px;
}

@media (max-width: 768px){

              transform:translateY(30px);

          to{

              transform:translateY(0);
          }

    <script>
    const startBtn = document.getElementById("startBtn");
    const startScreen = document.getElementById("startScreen");
    const cinematicText = document.getElementById("cinematicText");

    const bgMusic = document.getElementById("bgMusic");
    const poemMusic = document.getElementById("poemMusic");

    const surpriseBox = document.getElementById("surpriseBox");
    const showPoemBtn = document.getElementById("showPoemBtn");

    const poemScreen = document.getElementById("poemScreen");
    const poemText = document.getElementById("poemText");

    const flowersScreen = document.getElementById("flowersScreen");
    const canvas = document.getElementById("heart");

    const poema = `Las flores son bonitas, sí...
    pero duran una temporada.

    Tú tienes algo distinto,
    porque contigo no pienso
    en lo bonito de un instante,
    sino en la calma de quedarme.

    Y quizá por eso me recuerdas
    a un jardín...
    no por cómo se ve,
    sino por cómo se siente estar ahí ❤️`;

    startBtn.addEventListener("click", () => {

        startScreen.style.display = "none";

        cinematicText.classList.remove("hidden");

        setTimeout(() => {
            cinematicText.classList.add("show");
        }, 100);

        setTimeout(() => {
            cinematicText.classList.remove("show");
        }, 3500);

        setTimeout(() => {
            cinematicText.classList.add("hidden");

            canvas.style.opacity = "1";

            bgMusic.play();

            setTimeout(() => {

                bgMusic.pause();
                bgMusic.currentTime = 0;

                canvas.style.opacity = "0";

                surpriseBox.classList.remove("hidden");

            }, 3000);

        }, 5000);
    });


    // BOTÓN "QUIERO VERLA"
    showPoemBtn.addEventListener("click", () => {

        surpriseBox.classList.add("hidden");
        poemScreen.classList.remove("hidden");

        poemMusic.play();

        escribirPoema(poema, () => {

            // Espera 4 segundos
            setTimeout(() => {

                poemScreen.style.opacity = "0";

                setTimeout(() => {

                    poemScreen.classList.add("hidden");

                    // Mostrar flores
                    flowersScreen.classList.remove("hidden");

                    // Reiniciar animaciones de flores
                    setTimeout(() => {
                        document.body.classList.remove("not-loaded");
                    }, 100);
                }, 1200);

            }, 4000);
        });
    });


    // EFECTO MÁQUINA DE ESCRIBIR
    function escribirPoema(texto, callback){
        poemText.innerHTML = "";
        let i = 0;

        const intervalo = setInterval(() => {
            poemText.innerHTML += texto.charAt(i);
            i++;

            if(i >= texto.length){
                clearInterval(intervalo);

                if(callback) callback();
            }
        }, 45);
    }
    </script>
